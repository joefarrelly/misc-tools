{% extends "base.html" %}
{% block title %}Regex Tester — Toolbox{% endblock %}

{% block content %}
<div class="row mb-3">
  <div class="col">
    <h1 class="h3 fw-bold"><i class="bi bi-asterisk text-danger me-2"></i>Regex Tester</h1>
    <p class="text-muted">Test regular expressions with live match highlighting.</p>
  </div>
</div>

<div class="card border-0 shadow-sm mb-3">
  <div class="card-body p-4">
    <div class="row g-3 align-items-end">
      <div class="col-md-7">
        <label class="form-label small fw-semibold">Pattern</label>
        <div class="input-group">
          <span class="input-group-text text-muted">/</span>
          <input type="text" id="pattern" class="form-control font-monospace"
            placeholder="e.g. \d{4}-\d{2}-\d{2}" oninput="test()">
          <span class="input-group-text text-muted">/</span>
          <span class="input-group-text p-0">
            <div class="d-flex px-2 gap-2">
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="flagG" checked onchange="test()">
                <label class="form-check-label small" for="flagG">g</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="flagI" onchange="test()">
                <label class="form-check-label small" for="flagI">i</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="flagM" onchange="test()">
                <label class="form-check-label small" for="flagM">m</label>
              </div>
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="flagS" onchange="test()">
                <label class="form-check-label small" for="flagS">s</label>
              </div>
            </div>
          </span>
        </div>
        <div id="patternError" class="text-danger small mt-1"></div>
      </div>
      <div class="col-md-5">
        <div id="matchSummary" class="fs-5 text-muted">—</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom fw-semibold">Test String</div>
      <div class="card-body p-3">
        <textarea id="testString" class="form-control result-box" rows="14"
          placeholder="Paste text to test against..." oninput="test()"></textarea>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom fw-semibold">Highlighted Matches</div>
      <div class="card-body p-3">
        <div id="highlighted" class="result-box p-2 border rounded bg-white"
          style="min-height:300px; white-space:pre-wrap; word-break:break-all;"></div>
      </div>
    </div>
  </div>
</div>

<div id="matchList" class="mt-4"></div>
{% endblock %}

{% block scripts %}
<script>
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function test() {
  const patternVal = document.getElementById("pattern").value;
  const text = document.getElementById("testString").value;
  const errEl = document.getElementById("patternError");
  const summaryEl = document.getElementById("matchSummary");
  const highlightEl = document.getElementById("highlighted");
  const matchListEl = document.getElementById("matchList");

  errEl.textContent = '';
  highlightEl.innerHTML = escHtml(text);
  matchListEl.innerHTML = '';
  summaryEl.innerHTML = '—';
  summaryEl.className = 'fs-5 text-muted';

  if (!patternVal || !text) return;

  const flags = ['g', 'i', 'm', 's']
    .filter(f => document.getElementById('flag' + f.toUpperCase()).checked)
    .join('');

  let regex;
  try {
    regex = new RegExp(patternVal, flags.includes('g') ? flags : flags + 'g');
  } catch (e) {
    errEl.textContent = e.message;
    return;
  }

  const matches = [...text.matchAll(regex)];

  if (matches.length === 0) {
    summaryEl.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>No matches</span>';
    highlightEl.innerHTML = escHtml(text);
    return;
  }

  summaryEl.innerHTML = `<span class="text-success"><i class="bi bi-check-circle me-1"></i>${matches.length} match${matches.length !== 1 ? 'es' : ''}</span>`;

  // Build highlighted output
  let html = '';
  let last = 0;
  for (const m of matches) {
    html += escHtml(text.slice(last, m.index));
    html += `<mark class="px-0">${escHtml(m[0])}</mark>`;
    last = m.index + m[0].length;
    if (m[0].length === 0) { html += escHtml(text[last] || ''); last++; }
  }
  html += escHtml(text.slice(last));
  highlightEl.innerHTML = html;

  // Match list
  const hasGroups = matches[0].length > 1;
  const rows = matches.map((m, i) => {
    const groups = hasGroups
      ? [...m].slice(1).map((g, gi) => `<span class="badge bg-secondary ms-1">$${gi+1}: ${escHtml(g ?? 'undefined')}</span>`).join('')
      : '';
    return `<tr>
      <td class="text-muted small">${i + 1}</td>
      <td><code>${escHtml(m[0])}</code>${groups}</td>
      <td class="text-muted small">${m.index}</td>
      <td class="text-muted small">${m.index + m[0].length}</td>
    </tr>`;
  }).join('');

  matchListEl.innerHTML = `
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white border-bottom fw-semibold small">Match details</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr><th>#</th><th>Match</th><th>Start</th><th>End</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
}
</script>
{% endblock %}
