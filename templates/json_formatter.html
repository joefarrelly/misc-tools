{% extends "base.html" %}
{% block title %}JSON Formatter — Toolbox{% endblock %}

{% block content %}
<div class="row mb-3">
  <div class="col">
    <h1 class="h3 fw-bold"><i class="bi bi-braces text-warning me-2"></i>JSON Formatter</h1>
    <p class="text-muted">Pretty-print and validate JSON with syntax highlighting.</p>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
        <span class="fw-semibold">Input</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="clearAll()">Clear</button>
      </div>
      <div class="card-body p-3">
        <textarea id="jsonInput" class="form-control result-box border-0 p-0"
          rows="18" placeholder="Paste JSON here..." oninput="format()"></textarea>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
        <span class="fw-semibold">
          Output
          <span id="statusBadge" class="ms-2"></span>
        </span>
        <div class="d-flex gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="minify()">Minify</button>
          <button class="btn btn-sm btn-outline-primary" onclick="copyOutput()" id="copyBtn">
            <i class="bi bi-clipboard me-1"></i>Copy
          </button>
        </div>
      </div>
      <div class="card-body p-3">
        <pre id="jsonOutput" class="json-output mb-0" style="min-height: 380px;"></pre>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function syntaxHighlight(json) {
  json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g,
    match => {
      if (/^"/.test(match)) {
        return /:$/.test(match)
          ? `<span class="json-key">${match}</span>`
          : `<span class="json-string">${match}</span>`;
      }
      if (/true|false/.test(match)) return `<span class="json-boolean">${match}</span>`;
      if (/null/.test(match)) return `<span class="json-null">${match}</span>`;
      return `<span class="json-number">${match}</span>`;
    }
  );
}

function setStatus(valid, msg) {
  const el = document.getElementById("statusBadge");
  el.className = `badge ${valid ? 'bg-success' : 'bg-danger'}`;
  el.textContent = msg;
}

let lastFormatted = '';

function format() {
  const raw = document.getElementById("jsonInput").value.trim();
  const out = document.getElementById("jsonOutput");

  if (!raw) {
    out.innerHTML = '';
    document.getElementById("statusBadge").className = '';
    document.getElementById("statusBadge").textContent = '';
    lastFormatted = '';
    return;
  }

  try {
    const parsed = JSON.parse(raw);
    lastFormatted = JSON.stringify(parsed, null, 2);
    out.innerHTML = syntaxHighlight(lastFormatted);
    setStatus(true, 'Valid JSON');
  } catch (e) {
    out.textContent = e.message;
    setStatus(false, 'Invalid JSON');
    lastFormatted = '';
  }
}

function minify() {
  const raw = document.getElementById("jsonInput").value.trim();
  if (!raw) return;
  try {
    const parsed = JSON.parse(raw);
    lastFormatted = JSON.stringify(parsed);
    document.getElementById("jsonOutput").innerHTML = syntaxHighlight(
      lastFormatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    );
    setStatus(true, 'Valid JSON');
  } catch (e) {
    document.getElementById("jsonOutput").textContent = e.message;
    setStatus(false, 'Invalid JSON');
  }
}

function clearAll() {
  document.getElementById("jsonInput").value = '';
  document.getElementById("jsonOutput").innerHTML = '';
  document.getElementById("statusBadge").className = '';
  document.getElementById("statusBadge").textContent = '';
  lastFormatted = '';
}

async function copyOutput() {
  if (!lastFormatted) return;
  await navigator.clipboard.writeText(lastFormatted);
  const btn = document.getElementById("copyBtn");
  btn.innerHTML = '<i class="bi bi-check me-1"></i>Copied!';
  setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy'; }, 1500);
}
</script>
{% endblock %}
