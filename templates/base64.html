{% extends "base.html" %}
{% block title %}Base64 Encode/Decode — Toolbox{% endblock %}

{% block content %}
<div class="row mb-3">
  <div class="col">
    <h1 class="h3 fw-bold"><i class="bi bi-lock text-secondary me-2"></i>Base64 Encode / Decode</h1>
    <p class="text-muted">Convert between plain text and Base64.</p>
  </div>
</div>

<div class="row g-4">
  <!-- Encode -->
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom fw-semibold">
        <i class="bi bi-arrow-right-circle me-1 text-secondary"></i>Text &rarr; Base64
      </div>
      <div class="card-body p-4">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Plain Text</label>
          <textarea id="encodeInput" class="form-control result-box" rows="5"
            placeholder="Enter text to encode..." oninput="encode()"></textarea>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">Base64 Output</label>
          <div class="input-group">
            <textarea id="encodeOutput" class="form-control result-box" rows="3" readonly></textarea>
          </div>
        </div>
        <button class="btn btn-sm btn-outline-primary" onclick="copyField('encodeOutput', this)">
          <i class="bi bi-clipboard me-1"></i>Copy
        </button>
      </div>
    </div>
  </div>

  <!-- Decode -->
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom fw-semibold">
        <i class="bi bi-arrow-left-circle me-1 text-secondary"></i>Base64 &rarr; Text
      </div>
      <div class="card-body p-4">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Base64 Input</label>
          <textarea id="decodeInput" class="form-control result-box" rows="5"
            placeholder="Paste Base64 to decode..." oninput="decode()"></textarea>
        </div>
        <div class="mb-2">
          <label class="form-label small fw-semibold">Decoded Output</label>
          <textarea id="decodeOutput" class="form-control result-box" rows="3" readonly></textarea>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-primary" onclick="copyField('decodeOutput', this)">
            <i class="bi bi-clipboard me-1"></i>Copy
          </button>
          <span id="decodeError" class="text-danger small"></span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function encode() {
  const text = document.getElementById("encodeInput").value;
  document.getElementById("encodeOutput").value = text ? btoa(unescape(encodeURIComponent(text))) : '';
}

function decode() {
  const text = document.getElementById("decodeInput").value.trim();
  const errEl = document.getElementById("decodeError");
  if (!text) { document.getElementById("decodeOutput").value = ''; errEl.textContent = ''; return; }
  try {
    document.getElementById("decodeOutput").value = decodeURIComponent(escape(atob(text)));
    errEl.textContent = '';
  } catch {
    document.getElementById("decodeOutput").value = '';
    errEl.textContent = 'Invalid Base64 string';
  }
}

async function copyField(id, btn) {
  const val = document.getElementById(id).value;
  if (!val) return;
  await navigator.clipboard.writeText(val);
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="bi bi-check me-1"></i>Copied!';
  setTimeout(() => { btn.innerHTML = orig; }, 1500);
}
</script>
{% endblock %}
