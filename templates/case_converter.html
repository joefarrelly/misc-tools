{% extends "base.html" %}
{% block title %}Case Converter — Toolbox{% endblock %}

{% block content %}
<div class="row mb-3">
  <div class="col">
    <h1 class="h3 fw-bold"><i class="bi bi-type text-primary me-2"></i>Case Converter</h1>
    <p class="text-muted">Convert text to any case format instantly.</p>
  </div>
</div>

<div class="card border-0 shadow-sm mb-4">
  <div class="card-header bg-white border-bottom fw-semibold">Input</div>
  <div class="card-body p-3">
    <textarea id="inputText" class="form-control result-box" rows="4"
      placeholder="Type or paste text here..." oninput="convert()"></textarea>
  </div>
</div>

<div id="results" class="row g-3"></div>
{% endblock %}

{% block scripts %}
<script>
const CASES = [
  { label: 'UPPERCASE',         fn: s => s.toUpperCase() },
  { label: 'lowercase',         fn: s => s.toLowerCase() },
  { label: 'Title Case',        fn: s => s.replace(/\b\w/g, c => c.toUpperCase()) },
  { label: 'Sentence case',     fn: s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() },
  { label: 'camelCase',         fn: s => tokenize(s).map((w,i) => i === 0 ? w : cap(w)).join('') },
  { label: 'PascalCase',        fn: s => tokenize(s).map(cap).join('') },
  { label: 'snake_case',        fn: s => tokenize(s).join('_') },
  { label: 'SCREAMING_SNAKE',   fn: s => tokenize(s).join('_').toUpperCase() },
  { label: 'kebab-case',        fn: s => tokenize(s).join('-') },
  { label: 'COBOL-CASE',        fn: s => tokenize(s).join('-').toUpperCase() },
  { label: 'dot.case',          fn: s => tokenize(s).join('.') },
  { label: 'path/case',         fn: s => tokenize(s).join('/') },
];

function cap(w) { return w.charAt(0).toUpperCase() + w.slice(1); }

function tokenize(str) {
  return str
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
    .split(/[\s\-_./\\]+/)
    .filter(Boolean)
    .map(w => w.toLowerCase());
}

function convert() {
  const input = document.getElementById("inputText").value;
  const container = document.getElementById("results");

  if (!input.trim()) { container.innerHTML = ''; return; }

  container.innerHTML = CASES.map(({ label, fn }) => {
    const output = fn(input);
    const id = `case_${label.replace(/\W/g, '_')}`;
    return `
      <div class="col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm">
          <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center py-2">
            <span class="small fw-semibold text-muted">${label}</span>
            <button class="btn btn-sm btn-outline-secondary py-0" onclick="copyById('${id}', this)">
              <i class="bi bi-clipboard"></i>
            </button>
          </div>
          <div class="card-body p-3">
            <code id="${id}" class="text-break small">${escHtml(output)}</code>
          </div>
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function copyById(id, btn) {
  const text = document.getElementById(id).textContent;
  await navigator.clipboard.writeText(text);
  const orig = btn.innerHTML;
  btn.innerHTML = '<i class="bi bi-check"></i>';
  setTimeout(() => { btn.innerHTML = orig; }, 1500);
}
</script>
{% endblock %}
