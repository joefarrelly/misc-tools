{% extends "base.html" %}
{% block title %}De-dupe List — Toolbox{% endblock %}

{% block content %}
<div class="row mb-3">
  <div class="col">
    <h1 class="h3 fw-bold"><i class="bi bi-funnel text-primary me-2"></i>De-dupe List</h1>
    <p class="text-muted">Removes duplicate lines. First occurrence wins, order preserved.</p>
  </div>
</div>

<div class="row g-4">
  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
        <span class="fw-semibold">Input</span>
        <div class="d-flex gap-2 align-items-center">
          <div class="form-check form-switch mb-0">
            <input class="form-check-input" type="checkbox" id="caseSensitive" checked>
            <label class="form-check-label small" for="caseSensitive">Case sensitive</label>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="clearAll()">Clear</button>
        </div>
      </div>
      <div class="card-body p-3">
        <textarea id="inputList" class="form-control result-box border-0 p-0"
          rows="14" placeholder="Paste your list here, one item per line..."
          oninput="dedupe()"></textarea>
      </div>
    </div>
  </div>

  <div class="col-lg-6">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
        <span class="fw-semibold">
          Output
          <span id="statsLabel" class="text-muted fw-normal small ms-2"></span>
        </span>
        <button class="btn btn-sm btn-outline-primary" onclick="copyOutput()" id="copyBtn">
          <i class="bi bi-clipboard me-1"></i>Copy
        </button>
      </div>
      <div class="card-body p-3">
        <textarea id="outputList" class="form-control result-box border-0 p-0"
          rows="14" readonly placeholder="De-duped list will appear here..."></textarea>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function dedupe() {
  const raw = document.getElementById("inputList").value;
  const caseSensitive = document.getElementById("caseSensitive").checked;

  if (!raw.trim()) {
    document.getElementById("outputList").value = "";
    document.getElementById("statsLabel").textContent = "";
    return;
  }

  const lines = raw.split("\n");
  const seen = new Set();
  const result = [];
  let dupeCount = 0;

  for (const line of lines) {
    const key = caseSensitive ? line : line.toLowerCase();
    if (!seen.has(key)) {
      seen.add(key);
      result.push(line);
    } else {
      dupeCount++;
    }
  }

  document.getElementById("outputList").value = result.join("\n");
  document.getElementById("statsLabel").textContent =
    `${result.length} unique · ${dupeCount} removed`;
}

function clearAll() {
  document.getElementById("inputList").value = "";
  document.getElementById("outputList").value = "";
  document.getElementById("statsLabel").textContent = "";
}

async function copyOutput() {
  const text = document.getElementById("outputList").value;
  if (!text) return;
  await navigator.clipboard.writeText(text);
  const btn = document.getElementById("copyBtn");
  btn.innerHTML = '<i class="bi bi-check me-1"></i>Copied!';
  setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard me-1"></i>Copy'; }, 1500);
}

document.getElementById("caseSensitive").addEventListener("change", dedupe);
</script>
{% endblock %}
